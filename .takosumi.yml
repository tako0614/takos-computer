apiVersion: v1

# `dist/sandbox-host.js` is generated by the build-service profile in
# `.takosumi.build.yml`. Direct git/local apply requires that generated runtime
# file to exist in the resolved source; the normal deploy path passes a prepared
# source archive that contains it.
# Short kind names are operator-profile aliases. Gateway listeners/routes are
# gateway descriptor spec fields, not AppSpec core fields.
metadata:
  id: jp.takos.computer
  name: Takos Computer
  description: Browser automation and sandbox computer with a Streamable HTTP MCP server.
  publisher: takos
  homepage: https://github.com/tako0614/takos-computer

components:
  web:
    kind: worker
    spec:
      entrypoint: dist/sandbox-host.js
    listen:
      oidc:
        path: identity.primary.oidc
        inject: secret-env
        prefix: OIDC
        required: true

  public:
    kind: gateway
    connect:
      upstream:
        output: web.http
        inject: upstream
    spec:
      listeners:
        public:
          protocol: https
      routes:
        - listener: public
          path: /
          to: upstream

publish:
  public:
    output: public.public
    path: takos-computer.http.public
