apiVersion: takosumi.dev/v1

metadata:
  id: jp.takos.computer
  name: Takos Computer
  description: Browser automation and sandbox computer with a Streamable HTTP MCP server.
  publisher: takos
  homepage: https://github.com/tako0614/takos-computer

components:
  web:
    kind: worker
    build:
      command: deno task build:all
      output: dist/sandbox-host.js
    spec:
      routes:
        - /mcp
        - /gui
        - /gui/*
        - /gui/api/auth/*
        - /healthz
        - /health
        - /readyz
        - /create
        - /session
        - /session/:id
        - /session/:id/mcp
        - /icons/computer.svg
        - /gui/api/auth/callback
    listen:
      operator.identity.oidc:
        as: env
