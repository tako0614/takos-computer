apiVersion: app.takosumi.dev/v1
kind: InstallableApp
metadata:
  id: jp.takos.computer
  name: Takos Computer
  description: Browser automation and sandbox computer with a Streamable HTTP MCP server.
  publisher: takos
  homepage: https://github.com/tako0614/takos-computer
source:
  git: https://github.com/tako0614/takos-computer.git
  ref: v2.1.1
entry:
  manifest: .takosumi/manifest.yml
runtime:
  modes:
    - shared-cell
    - dedicated
    - self-hosted
bindings:
  auth:
    type: identity.oidc@v1
    required: true
    redirectPaths:
      - /gui/api/auth/callback
    allowedScopes:
      - openid
      - profile
      - email
    subjectMode: pairwise
  domain:
    type: domain.http@v1
    required: false
    hostname: auto
    tlsMode: auto
  bootstrap:
    type: install-launch-token@v1
    required: true
    consumePath: /gui/api/auth/launch
    maxLifetimeSeconds: 300
install:
  healthcheckPath: /readyz
  postInstallLaunchPath: /gui/api/auth/launch
permissions:
  requested:
    - spaces:read
    - files:read
    - files:write
    - memories:read
    - memories:write
    - threads:read
    - threads:write
    - runs:read
    - runs:write
    - agents:execute
    - repos:read
    - repos:write
    - mcp:invoke
    - events:subscribe
    - logs.read.own
upgrade:
  policy:
    securityPatch: ask
    minor: ask
    major: manual
compatibility:
  takosumi-git: ">=0.4.0"
  kernel: ">=1.0.0"
