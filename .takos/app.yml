apiVersion: takos.dev/v1alpha1
kind: App
metadata:
  name: takos-computer
spec:
  version: "1.0.0"
  description: Browser automation and agent executor
  category: service
  tags:
    - browser
    - executor
    - agent
    - playwright
  env:
    required:
      - TAKOS_ACCESS_TOKEN
  takos:
    scopes:
      - threads:read
      - threads:write
      - runs:read
      - runs:write
      - repos:read
  resources:
    mcp-auth-secret:
      type: secretRef
      binding: MCP_AUTH_TOKEN
      generate: true
  services:
    browser-host:
      type: worker
      containers:
        - name: browser
          dockerfile: packages/browser-service/Dockerfile
          port: 8080
          instanceType: standard-2
          maxInstances: 25
      build:
        fromWorkflow:
          path: .takos/workflows/deploy.yml
          job: build-browser-host
          artifact: browser-host
          artifactPath: dist/browser-host.js
    executor-host:
      type: worker
      containers:
        - name: executor
          dockerfile: packages/executor-service/Dockerfile
          port: 8080
          instanceType: basic
          maxInstances: 100
      build:
        fromWorkflow:
          path: .takos/workflows/deploy.yml
          job: build-executor-host
          artifact: executor-host
          artifactPath: dist/executor-host.js
      bindings:
        services:
          - takos-control
  routes:
    - name: browser-api
      service: browser-host
      path: /session
    - name: browser-mcp
      service: browser-host
      path: /mcp
    - name: executor-api
      service: executor-host
      path: /dispatch
  mcpServers:
    - name: takos-computer
      route: browser-mcp
      transport: streamable-http
      authSecretRef: mcp-auth-secret
