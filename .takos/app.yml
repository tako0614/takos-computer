name: takos-computer
version: "2.1.0"

publications:
  - name: computer-ui
    type: publication.http-endpoint@v1
    display:
      title: Computer
      description: Browser automation and sandbox computer
      icon: /icons/computer.svg
      category: agent
      sortOrder: 100
    outputs:
      url:
        kind: url
        routeRef: gui
  - name: computer-mcp
    type: publication.mcp-server@v1
    display:
      title: Computer MCP
    outputs:
      url:
        kind: url
        routeRef: mcp
    auth:
      bearer:
        secretRef: PUBLISHED_MCP_AUTH_TOKEN
    spec:
      transport: streamable-http
      description: Agent-accessible sandbox computer tools

compute:
  web:
    icon: /icons/computer.svg
    readiness: /readyz
    env:
      TAKOS_TRUST_ROUTED_GUI_API: "1"
    consume:
      - publication: takos.api-key
        as: takos-computer-api
        request:
          scopes:
            - spaces:read
            - files:read
            - files:write
            - memories:read
            - memories:write
            - threads:read
            - threads:write
            - runs:read
            - runs:write
            - agents:execute
            - repos:read
            - repos:write
            - mcp:invoke
            - events:subscribe
        inject:
          env:
            endpoint: TAKOS_API_URL
            apiKey: TAKOS_TOKEN
    build:
      fromWorkflow:
        path: .takos/workflows/deploy.yml
        job: build-sandbox-host
        artifact: sandbox-host
        artifactPath: dist/sandbox-host.js
    containers:
      sandbox:
        image: apps/sandbox/Dockerfile
        dockerfile: apps/sandbox/Dockerfile
        port: 8080
        healthCheck:
          path: /healthz
        cloudflare:
          container:
            binding: SANDBOX_CONTAINER
            className: SandboxSessionContainer
            instanceType: basic
            maxInstances: 100
            imageBuildContext: .
            migrationTag: v1

resources:
  session-index:
    type: key-value
    bindings:
      web: SESSION_INDEX
  sandbox-host-token:
    type: secret
    generate: true
    bind: SANDBOX_HOST_AUTH_TOKEN
    to: web
  sandbox-mcp-token:
    type: secret
    generate: true
    bind: MCP_AUTH_TOKEN
    to: web
  published-mcp-token:
    type: secret
    generate: true
    bind: PUBLISHED_MCP_AUTH_TOKEN
    to: web

routes:
  - id: mcp
    target: web
    path: /mcp
  - id: healthz
    target: web
    path: /healthz
  - id: health
    target: web
    path: /health
  - id: readyz
    target: web
    path: /readyz
  - id: create
    target: web
    path: /create
  - id: gui
    target: web
    path: /gui
  - id: icon
    target: web
    path: /icons/computer.svg
  - id: session
    target: web
    path: /session
  - id: session-mcp
    target: web
    path: /session/:id/mcp
  - id: gui-session-mcp
    target: web
    path: /gui/api/sandbox-session/:id/mcp
