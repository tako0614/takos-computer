apiVersion: takos.dev/v1alpha1
kind: App
metadata:
  name: takos-computer
spec:
  version: "1.0.0"
  description: Browser automation and agent executor
  category: service
  tags:
    - browser
    - executor
    - agent
    - playwright

  containers:
    browser:
      dockerfile: packages/browser-service/Dockerfile
      port: 8080
      instanceType: standard-2
      maxInstances: 25
    executor:
      dockerfile: packages/executor-service/Dockerfile
      port: 8080
      instanceType: basic
      maxInstances: 100

  workers:
    browser-host:
      containers: [browser]
      build:
        fromWorkflow:
          path: .takos/workflows/deploy.yml
          job: build-browser-host
          artifact: browser-host
          artifactPath: dist/browser-host.js
    executor-host:
      containers: [executor]
      build:
        fromWorkflow:
          path: .takos/workflows/deploy.yml
          job: build-executor-host
          artifact: executor-host
          artifactPath: dist/executor-host.js
      bindings:
        services:
          - takos-control

  routes:
    - name: browser-gui
      target: browser-host
      path: /gui
    - name: browser-api
      target: browser-host
      path: /api
    - name: browser-session
      target: browser-host
      path: /session
    - name: browser-mcp
      target: browser-host
      path: /mcp
    - name: executor-api
      target: executor-host
      path: /dispatch

  resources:
    mcp-auth-secret:
      type: secretRef
      binding: MCP_AUTH_TOKEN
      generate: true

  env:
    required:
      - TAKOS_ACCESS_TOKEN
    inject:
      BROWSER_API_URL: "{{routes.browser-api.url}}"
      EXECUTOR_API_URL: "{{routes.executor-api.url}}"

  takos:
    scopes:
      - threads:read
      - threads:write
      - runs:read
      - runs:write
      - repos:read

  mcpServers:
    - name: takos-computer
      route: browser-mcp
      transport: streamable-http
      authSecretRef: mcp-auth-secret
