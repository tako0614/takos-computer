name: takos-computer
version: "2.1.0"

publish:
  - name: computer-ui
    publisher: web
    type: UiSurface
    outputs:
      url:
        route: /gui
    title: Computer
    spec:
      description: Browser automation and sandbox computer
      icon: /icons/computer.svg
      category: agent
      sortOrder: 100
  - name: computer-mcp
    publisher: web
    type: McpServer
    outputs:
      url:
        route: /mcp
    title: Computer MCP
    auth:
      bearer:
        secretRef: PUBLISHED_MCP_AUTH_TOKEN
    spec:
      transport: streamable-http
      description: Agent-accessible sandbox computer tools

compute:
  web:
    icon: /icons/computer.svg
    readiness: /readyz
    env:
      TAKOS_TRUST_ROUTED_GUI_API: "1"
    consume:
      - publication: takos.api-key
        as: takos-computer-api
        request:
          scopes:
            - spaces:read
            - files:read
            - files:write
            - memories:read
            - memories:write
            - threads:read
            - threads:write
            - runs:read
            - runs:write
            - agents:execute
            - repos:read
            - repos:write
            - mcp:invoke
            - events:subscribe
        env:
          endpoint: TAKOS_API_URL
          apiKey: TAKOS_TOKEN
    build:
      fromWorkflow:
        path: .takos/workflows/deploy.yml
        job: build-sandbox-host
        artifact: sandbox-host
        artifactPath: dist/sandbox-host.js
    containers:
      sandbox:
        image: apps/sandbox/Dockerfile
        dockerfile: apps/sandbox/Dockerfile
        port: 8080
        healthCheck:
          path: /healthz
        cloudflare:
          container:
            binding: SANDBOX_CONTAINER
            className: SandboxSessionContainer
            instanceType: basic
            maxInstances: 100
            imageBuildContext: .
            migrationTag: v1

resources:
  session-index:
    type: key-value
    bindings:
      web: SESSION_INDEX
  sandbox-host-token:
    type: secret
    generate: true
    bind: SANDBOX_HOST_AUTH_TOKEN
    to: web
  sandbox-mcp-token:
    type: secret
    generate: true
    bind: MCP_AUTH_TOKEN
    to: web

routes:
  - target: web
    path: /mcp
  - target: web
    path: /healthz
  - target: web
    path: /health
  - target: web
    path: /readyz
  - target: web
    path: /create
  - target: web
    path: /gui
  - target: web
    path: /icons/computer.svg
  - target: web
    path: /session
  - target: web
    path: /session/:id/mcp
  - target: web
    path: /gui/api/sandbox-session/:id/mcp
